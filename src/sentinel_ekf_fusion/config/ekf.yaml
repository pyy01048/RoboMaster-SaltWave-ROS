ekf_filter_node:
  ros__parameters:
    # 发布频率
    frequency: 50.0
    # 传感器超时时间
    sensor_timeout: 0.1
    # 两帧数据时间差阈值
    two_d_mode: false
    publish_tf: true
    publish_acceleration: false
    use_control: false
    stamped_control: false
    control_timeout: 0.2
    control_config: [false, false, false, false, false, true]
    acceleration_limits: [1.3, 0.0, 0.0]
    deceleration_limits: [2.5, 0.0, 0.0]
    acceleration_gains: [0.8, 0.0, 0.0]
    deceleration_gains: [1.0, 0.0, 0.0]
    
    # IMU配置
    imu0: /livox/imu
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  false,  false,  false,
                  true,  true,  true]
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_linear_acceleration_integration: true
    
    # FAST-LIO里程计配置
    odom0: /Odometry
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   true,  true,  false]
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    odom1: /ekf_fusion_node/odom
    odom1_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   true, true, false]
    odom1_queue_size: 10
    odom1_nodelay: false
    odom1_differential: false
    odom1_relative: false
    odom1_pose_rejection_threshold: 5.0
    odom1_twist_rejection_threshold: 1.0

